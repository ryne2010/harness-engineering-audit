name: Release Skill

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: write
  actions: read
  security-events: write

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish skill release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'workflow_run' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow-run commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check release-relevant changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"

          if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
            changed_files="$(git diff --name-only "${head_sha}^" "${head_sha}")"
          else
            changed_files="$(git ls-tree -r --name-only "${head_sha}")"
          fi

          printf 'Changed files considered for release:\n%s\n' "${changed_files}"

          if printf '%s\n' "${changed_files}" | grep -Eq '^(skills/|plugins/|\.agents/plugins/|docs/|README\.md$|LICENSE$|CHANGELOG\.md$|pyproject\.toml$|tests/|\.github/workflows/release-skill\.yml$|\.github/workflows/codeql\.yml$|\.github/workflows/validate\.yml$)'; then
            echo "release_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "No release-relevant changes detected; skipping publish."
            echo "release_relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure GitHub CLI has gh skill support
        if: steps.changes.outputs.release_relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Preinstalled gh:"
          gh --version || true

          if gh skill --help >/dev/null 2>&1; then
            echo "gh skill is already available."
            exit 0
          fi

          echo "gh skill is missing; installing latest GitHub CLI release..."

          ARCH="$(dpkg --print-architecture)"
          case "$ARCH" in
            amd64) GH_ARCH="amd64" ;;
            arm64) GH_ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          GH_VERSION="$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')"

          echo "Installing gh ${GH_VERSION} for ${GH_ARCH}"

          curl -fsSL \
            "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${GH_ARCH}.deb" \
            -o /tmp/gh.deb

          sudo apt-get update
          sudo apt-get install -y /tmp/gh.deb

          echo "Installed gh:"
          gh --version
          gh skill --help

      - name: Validate Python scripts
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 -m py_compile skills/harness-engineering-audit/scripts/*.py
          python3 -m py_compile tests/smoke/run_skill_smoke.py
          python3 -m py_compile tests/check_skill_mirror.py

      - name: Validate plugin mirror parity
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 tests/check_skill_mirror.py

      - name: Run smoke test
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 tests/smoke/run_skill_smoke.py

      - name: Validate skill package
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --dry-run

      - name: Compute next release tag
        if: steps.changes.outputs.release_relevant == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          BASE_MINOR="v0.2"
          latest="$(git tag -l "${BASE_MINOR}.*" --sort=-v:refname | head -n 1 || true)"

          if [ -z "$latest" ]; then
            next="${BASE_MINOR}.0"
          else
            patch="${latest##*.}"
            if ! [[ "$patch" =~ ^[0-9]+$ ]]; then
              echo "Latest tag $latest does not end in a numeric patch version." >&2
              exit 1
            fi
            next="${BASE_MINOR}.$((patch + 1))"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next release tag: $next"

      - name: Publish skill release
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --tag "${{ steps.version.outputs.tag }}"
