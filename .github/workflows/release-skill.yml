name: Release Skill

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "plugins/**"
      - ".agents/plugins/**"
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - ".github/workflows/release-skill.yml"
      - "tests/**"

permissions:
  contents: write
  actions: read
  security-events: write

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish skill release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install GitHub CLI with gh skill support
        shell: bash
        run: |
          set -euo pipefail

          GH_VERSION="2.90.0"
          ARCH="$(dpkg --print-architecture)"

          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH}.deb" -o /tmp/gh.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/gh.deb

          gh --version
          gh skill --help

      - name: Validate Python scripts
        run: |
          python3 -m py_compile skills/harness-engineering-audit/scripts/*.py
          python3 -m py_compile tests/smoke/run_skill_smoke.py

      - name: Run smoke test
        run: |
          python3 tests/smoke/run_skill_smoke.py

      - name: Validate skill package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --dry-run

      - name: Compute next release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          BASE_MINOR="v0.1"
          latest="$(git tag -l "${BASE_MINOR}.*" --sort=-v:refname | head -n 1 || true)"

          if [ -z "$latest" ]; then
            next="${BASE_MINOR}.0"
          else
            patch="${latest##*.}"
            if ! [[ "$patch" =~ ^[0-9]+$ ]]; then
              echo "Latest tag $latest does not end in a numeric patch version." >&2
              exit 1
            fi
            next="${BASE_MINOR}.$((patch + 1))"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next release tag: $next"

      - name: Publish skill release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --tag "${{ steps.version.outputs.tag }}"
