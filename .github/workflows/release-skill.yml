name: Release Skill

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish skill release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'workflow_run' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow-run commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release train
        id: release_base
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/release_skill_workflow.py resolve-base --github-output "$GITHUB_OUTPUT"

      - name: Check release-relevant changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          base_minor="${{ steps.release_base.outputs.base_minor }}"

          git fetch --tags --force
          python3 scripts/release_skill_workflow.py check-changes \
            --head-sha "$head_sha" \
            --base-minor "$base_minor" \
            --github-output "$GITHUB_OUTPUT"

      - name: Install GitHub CLI with gh skill support
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Bundled GitHub CLI:"
          gh --version
          mkdir -p "$RUNNER_TEMP/gh-cli"
          gh release download \
            --repo cli/cli \
            --pattern 'gh_*_linux_amd64.deb' \
            --dir "$RUNNER_TEMP/gh-cli" \
            --clobber
          sudo dpkg -i "$RUNNER_TEMP"/gh-cli/gh_*_linux_amd64.deb
          echo "Provisioned GitHub CLI:"
          gh --version

      - name: Verify GitHub CLI has gh skill support
        if: steps.changes.outputs.release_relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! gh skill --help >/dev/null 2>&1; then
            echo "::error::Provisioned GitHub CLI does not provide 'gh skill'. Use a runner image or release channel with gh skill support, or publish manually from an environment that has it."
            exit 1
          fi

      - name: Run canonical validation
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          make validate

      - name: Compute next release tag
        if: steps.changes.outputs.release_relevant == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          python3 scripts/release_skill_workflow.py next-tag \
            --base-minor "${{ steps.release_base.outputs.base_minor }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Stamp release metadata
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          python3 scripts/release_skill_workflow.py stamp-release --tag "$RELEASE_TAG"
          make mirror-parity

      - name: Validate skill package
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --dry-run

      - name: Publish skill release
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          publish_log="$RUNNER_TEMP/gh-skill-publish.log"

          for attempt in 1 2 3; do
            echo "Publishing ${RELEASE_TAG} (attempt ${attempt}/3)..."
            set +e
            gh skill publish --tag "$RELEASE_TAG" 2>&1 | tee "$publish_log"
            publish_status=${PIPESTATUS[0]}
            set -e

            if [ "$publish_status" -eq 0 ]; then
              exit 0
            fi

            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              echo "::notice::gh skill publish exited with ${publish_status}, but release ${RELEASE_TAG} exists. Treating publish as complete."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::gh skill publish failed with ${publish_status}; retrying in ${sleep_seconds}s."
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::gh skill publish failed after 3 attempts and release ${RELEASE_TAG} was not found."
          cat "$publish_log"
          exit 1
