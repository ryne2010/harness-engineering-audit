name: Release Skill

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: write
  actions: read
  security-events: write

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish skill release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'workflow_run' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow-run commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release train
        id: release_base
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/release_skill_workflow.py resolve-base --github-output "$GITHUB_OUTPUT"

      - name: Check release-relevant changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${{ github.event.workflow_run.head_sha }}"
          base_minor="${{ steps.release_base.outputs.base_minor }}"

          git fetch --tags --force
          python3 scripts/release_skill_workflow.py check-changes \
            --head-sha "$head_sha" \
            --base-minor "$base_minor" \
            --github-output "$GITHUB_OUTPUT"

      - name: Ensure GitHub CLI has gh skill support
        if: steps.changes.outputs.release_relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Preinstalled gh:"
          gh --version || true

          if gh skill --help >/dev/null 2>&1; then
            echo "gh skill is already available."
            exit 0
          fi

          echo "gh skill is missing; installing latest GitHub CLI release..."

          ARCH="$(dpkg --print-architecture)"
          case "$ARCH" in
            amd64) GH_ARCH="amd64" ;;
            arm64) GH_ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          GH_VERSION="$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"].lstrip("v"))')"

          echo "Installing gh ${GH_VERSION} for ${GH_ARCH}"

          curl -fsSL \
            "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${GH_ARCH}.deb" \
            -o /tmp/gh.deb

          sudo apt-get update
          sudo apt-get install -y /tmp/gh.deb

          echo "Installed gh:"
          gh --version
          gh skill --help

      - name: Validate Python scripts
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 -m py_compile skills/harness-engineering-audit/scripts/*.py
          python3 -m py_compile scripts/release_skill_workflow.py
          python3 -m py_compile tests/smoke/run_skill_smoke.py
          python3 -m py_compile tests/smoke/run_release_workflow_smoke.py
          python3 -m py_compile tests/check_skill_mirror.py

      - name: Validate plugin mirror parity
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 tests/check_skill_mirror.py

      - name: Run smoke test
        if: steps.changes.outputs.release_relevant == 'true'
        run: |
          python3 tests/smoke/run_skill_smoke.py
          python3 tests/smoke/run_release_workflow_smoke.py

      - name: Compute next release tag
        if: steps.changes.outputs.release_relevant == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          python3 scripts/release_skill_workflow.py next-tag \
            --base-minor "${{ steps.release_base.outputs.base_minor }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Stamp release metadata
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          python3 scripts/release_skill_workflow.py stamp-release --tag "$RELEASE_TAG"
          python3 tests/check_skill_mirror.py

      - name: Validate skill package
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --dry-run

      - name: Publish skill release
        if: steps.changes.outputs.release_relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --tag "${{ steps.version.outputs.tag }}"
