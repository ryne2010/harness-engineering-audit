name: Release Skill

on:
  push:
    branches:
      - main
    # paths:
    #   - "skills/**"
    #   - "plugins/**"
    #   - ".agents/plugins/**"
    #   - "docs/**"
    #   - "README.md"
    #   - "LICENSE"
    #   - "CHANGELOG.md"
    #   - "pyproject.toml"
    #   - ".github/workflows/release-skill.yml"
    #   - "tests/**"

permissions:
  contents: write
  actions: read
  security-events: write

concurrency:
  group: release-skill-main
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish skill release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python scripts
        run: |
          python3 -m py_compile skills/harness-engineering-audit/scripts/*.py
          python3 -m py_compile tests/smoke/run_skill_smoke.py

      - name: Run smoke test
        run: |
          python3 tests/smoke/run_skill_smoke.py

      - name: Validate skill package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --dry-run

      - name: Compute timestamp release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="v$(date -u +'%Y.%m.%d.%H%M%S')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Next release tag: $tag"

      - name: Publish skill release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh skill publish --tag "${{ steps.version.outputs.tag }}"